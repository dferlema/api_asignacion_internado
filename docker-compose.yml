# docker-compose.yml
# Se usan tags estables disponibles en Docker Hub

services:

  postgres:
    image: postgres:16.2
    container_name: internado_postgres
    restart: always
    environment:
      POSTGRES_DB:       innotech_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: internado_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: